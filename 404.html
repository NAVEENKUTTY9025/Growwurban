<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="404 – page not found. Groww Urban urban farming collective.">
    <title>404 · page not found · Groww Urban</title>
     <link rel="icon" type="image/jpeg" href="/images/growwpark_logo.jpg" />
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..900&display=swap" rel="stylesheet">
    <style>
        /* ----- RESET & VARIABLES (exactly as index) ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-primary: #FAFAFA;        /* smoke */
            --bg-secondary: #f0f0e8;       /* soft warm off-white */
            --text-main: #111111;           /* deep */
            --text-heading: #111111;
            --card-bg: #ffffff;
            --border-light: #ddddd5;
            --accent-green: #556B2F;        /* olive */
            --accent-brown: #6D4C41;         /* soil */
            --navbar-bg: #111111;            /* deep black */

            --olive: #556B2F;
            --soil: #6D4C41;
            --deep: #111111;
            --smoke: #FAFAFA;
        }
        [data-theme="dark"] {
            --bg-primary: #111111;
            --bg-secondary: #1e1e1e;
            --text-main: #EAEAEA;
            --text-heading: #FAFAFA;
            --card-bg: #222222;
            --border-light: #3a3a3a;
            --accent-green: #6b8c3e;
            --accent-brown: #8b6b5a;
            --navbar-bg: #000000;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--deep);  /* unified dark to match 404 hero */
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            line-height: 1.5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;               /* 🔒 no scroll at all */
        }
        h1, h2, h3, h4, h5, h6 {
            color: var(--text-heading);
            font-weight: 700;
            line-height: 1.2;
        }
        a {
            text-decoration: none;
        }
        /* container */
        .container {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        /* navbar – exact copy from index (compact, no scroll influence) */
        .navbar-container {
            background-color: var(--navbar-bg);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border-bottom: 1px solid #2f2f2f;
            padding: 0.5rem 0;             /* slightly tighter to keep everything in view */
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            flex-shrink: 0;
        }
        .navbar-flex {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: transform 0.2s;
        }
        .logo:hover {
            transform: scale(1.05);
        }
        .logo-icon {
            width: 2.5rem;                 /* slightly smaller for fixed fit */
            height: 2.5rem;
            background-color: rgba(255,255,255,0.1);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--olive);
            overflow: hidden;
        }
        .logo-icon i {
            color: var(--olive);
            font-size: 1.6rem;
        }
        .logo-text {
            font-size: 1.3rem;
            font-weight: 900;
            color: white;
            letter-spacing: -0.02em;
        }
        .logo-text span {
            color: var(--olive);
        }
        .logo-tagline {
            font-size: 0.6rem;
            color: #ccc;
            display: block;
            margin-top: -0.25rem;
            font-weight: 500;
            letter-spacing: 0.05em;
        }
        /* desktop nav */
        .desktop-nav {
            display: none;
            align-items: center;
            gap: 0.25rem;
        }
        .nav-link {
            color: #e0e0e0;
            padding: 0.5rem 0.875rem;
            transition: 0.2s;
            font-weight: 500;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .nav-link:hover {
            color: #FAFAFA;
            background-color: #2a2a2a;
            border-radius: 30px;
        }
        .navbar-right-desktop {
            display: none;
            align-items: center;
            gap: 0.5rem;
        }
        .icon-btn {
            width: 2.2rem;
            height: 2.2rem;
            background-color: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .icon-btn:hover {
            background-color: var(--olive);
            color: var(--deep);
        }
        .login-btn {
            background-color: var(--olive);
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: 0.2s;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }
        .login-btn:hover {
            background-color: white;
            color: var(--deep);
        }
        /* mobile menu button (visible only below 1280px) */
        .mobile-menu-btn {
            display: flex;
            color: white;
            font-size: 1.5rem;
            background: transparent;
            border: none;
            cursor: pointer;
        }
        /* mobile menu overlay (static inside body but transforms) */
        .mobile-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--deep);
            z-index: 9999;
            overflow-y: auto;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .mobile-menu.active {
            transform: translateX(0);
        }
        .mobile-menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid #2a2a2a;
        }
        .mobile-menu-close {
            color: white;
            font-size: 2rem;
            background: none;
            border: none;
            cursor: pointer;
        }
        .mobile-menu-items {
            padding: 1.5rem;
        }
        .mobile-menu-item, .mobile-action-item {
            display: flex;
            align-items: center;
            padding: 1rem 0;
            color: white;
            font-size: 1.25rem;
            font-weight: 500;
            border-bottom: 1px solid #2a2a2a;
            transition: 0.2s;
            background: transparent;
            border: none;
            width: 100%;
            cursor: pointer;
        }
        .mobile-menu-item i, .mobile-action-item i {
            color: var(--olive);
            margin-right: 1rem;
            width: 1.75rem;
        }

        /* 404 HERO – takes remaining viewport height (no scroll) */
        .hero-404 {
            background-color: var(--deep);
            flex: 1;                       /* fills space between fixed navbar and footer */
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;               /* hide pattern overflow, no scrolling */
            margin-top: 62px;                /* fixed navbar height (approx) */
            margin-bottom: 0;
            padding: 1rem 0 1rem 0;
            min-height: 0;                  /* essential for flex constraints */
        }
        .hero-pattern {
            position: absolute;
            inset: 0;
            opacity: 0.1;
            pointer-events: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22 width=%2240%22 height=%2240%22><path fill=%22%23556B2F%22 d=%22M0 0 L40 40 M40 0 L0 40%22 stroke-width=%221%22 stroke=%22%236D4C41%22 opacity=%220.4%22 /></svg>');
        }
        .content-404 {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
            z-index: 5;
            padding: 0.5rem 1rem;
            width: 100%;
        }
        .number-404 {
            font-size: 8rem;                /* scaled down slightly to fit tight */
            font-weight: 900;
            color: var(--olive);
            line-height: 1;
            text-shadow: 0 10px 30px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .number-404 span {
            color: white;
            font-size: 4rem;
            opacity: 0.4;
            align-self: flex-end;
        }
        .vegetable-icon {
            font-size: 3.5rem;
            color: var(--soil);
            background: rgba(255,255,255,0.1);
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.8rem;
            border: 4px solid var(--olive);
        }
        .title-404 {
            font-size: 2.2rem;
            color: white;
            font-weight: 800;
            margin-bottom: 0.25rem;
        }
        @media (min-width: 640px) {
            .title-404 { font-size: 3rem; }
        }
        .description-404 {
            font-size: 1.1rem;
            color: #d1d5db;
            margin-bottom: 1.5rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        .btn-404-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .btn-primary {
            background-color: var(--olive);
            color: white;
            padding: 0.75rem 1.8rem;
            border-radius: 9999px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: 0.2s;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
        }
        .btn-primary:hover {
            background-color: white;
            color: var(--deep);
        }
        .btn-outline {
            border: 2px solid white;
            color: white;
            padding: 0.75rem 1.8rem;
            border-radius: 9999px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: 0.2s;
            background: transparent;
            cursor: pointer;
        }
        .btn-outline:hover {
            background-color: white;
            color: var(--deep);
        }
        .farm-fact {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
            color: white;
        }
        .fact-item {
            text-align: left;
        }
        .fact-number {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--olive);
            line-height: 1;
        }
        .fact-label {
            font-size: 0.75rem;
            display: block;
        }

        /* FOOTER – compact, pinned at bottom (no scroll) */
        .footer {
            background-color: var(--deep);
            color: white;
            padding: 0.75rem 0 1rem 0;      /* very compact */
            border-top: 1px solid #2a2a2a;
            flex-shrink: 0;
            width: 100%;
        }
        .footer-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }
        @media (min-width: 640px) {
            .footer-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        .footer-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }
        .footer-logo-icon {
            width: 2.2rem;
            height: 2.2rem;
            background-color: rgba(255,255,255,0.1);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--olive);
        }
        .footer-logo-icon i {
            color: var(--olive);
            font-size: 1.4rem;
        }
        .footer-logo-text {
            font-size: 1.1rem;
            font-weight: 900;
            color: white;
            letter-spacing: -0.02em;
        }
        .footer-logo-text span {
            color: var(--olive);
        }
        .footer-tagline {
            font-size: 0.5rem;
            color: #ccc;
            display: block;
            margin-top: -0.1rem;
        }
        .footer-heading {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            color: var(--olive);
        }
        .footer-links {
            list-style: none;
        }
        .footer-links li {
            margin-bottom: 0.2rem;
        }
        .footer-links a {
            color: #9ca3af;
            transition: 0.2s;
            font-size: 0.75rem;
        }
        .footer-links a:hover {
            color: var(--olive);
        }
        .footer-input {
            width: 100%;
            padding: 0.4rem 0.6rem;
            border-radius: 9999px;
            margin-bottom: 0.25rem;
            border: none;
            font-size: 0.75rem;
        }
        .footer-btn {
            width: 100%;
            background-color: var(--olive);
            color: white;
            padding: 0.4rem 0;
            border-radius: 9999px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.75rem;
        }
        .footer-btn:hover {
            background-color: white;
            color: var(--deep);
        }
        .copyright {
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 0.5rem;
            text-align: center;
            color: #9ca3af;
            font-size: 0.65rem;
        }

        /* scroll-top hidden because no scroll */
        #scroll-top {
            display: none !important;
        }

        @media (min-width: 1280px) {
            .desktop-nav { display: flex; }
            .navbar-right-desktop { display: flex; }
            .mobile-menu-btn { display: none; }
        }

        .fade-in-up {
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ensure no overflow creates scroll */
        html, body {
            overflow: hidden;
            height: 100%;
        }
    </style>
</head>
<body>

<!-- NAVBAR (identical to index but compact, no dropdowns) -->


<!-- MOBILE MENU overlay (identical functionality) -->

</div>

<!-- 404 CONTENT – FIXED CENTERED HERO (takes all remaining space) -->
<section class="hero-404">
    <div class="hero-pattern"></div>
    <div class="container content-404 fade-in-up">
        <div class="vegetable-icon">
            <i class="fas fa-seedling"></i>
        </div>
        <div class="number-404">
            4 <span><i class="fas fa-leaf" style="color: var(--olive);"></i></span> 4
        </div>
        <h1 class="title-404">page not found</h1>
        <p class="description-404">
            looks like this row has been harvested. the page you're looking for doesn't exist or was moved.
        </p>
        <div class="btn-404-group">
            <a href="index.html" class="btn-primary"><i class="fas fa-seedling"></i> back to homepage</a>
            <a href="contact.html" class="btn-outline"><i class="fas fa-envelope"></i> contact grower</a>
        </div>
        <!-- farm stats (like index) to keep consistent -->
        <div class="farm-fact">
            <div class="fact-item"><span class="fact-number">+450</span> <span class="fact-label">urban farms</span></div>
            <div class="fact-item"><span class="fact-number">12k</span> <span class="fact-label">weekly harvests</span></div>
        </div>
    </div>
</section>

<!-- FOOTER (compact version, no scroll trigger) -->


<!-- hidden scroll-top (not used) -->
<button id="scroll-top" style="display:none;"><i class="fas fa-arrow-up"></i></button>

<script>
    // EXACT theme / rtl / mobile menu logic – identical to index
    const htmlEl = document.documentElement;
    const desktopTheme = document.getElementById('desktop-theme-toggle');
    const mobileTheme = document.getElementById('mobile-theme-toggle');
    const desktopIcon = document.getElementById('desktop-theme-icon');
    const mobileIcon = document.getElementById('mobile-theme-icon');
    const desktopRtl = document.getElementById('desktop-rtl-toggle');
    const mobileRtl = document.getElementById('mobile-rtl-toggle');

    let theme = localStorage.getItem('theme') || 'light';
    htmlEl.setAttribute('data-theme', theme);
    if (theme === 'dark') { 
        htmlEl.classList.add('dark'); 
        if(desktopIcon) desktopIcon.className = 'fas fa-sun'; 
        if(mobileIcon) mobileIcon.className = 'fas fa-sun'; 
    } else {
        if(desktopIcon) desktopIcon.className = 'fas fa-circle-half-stroke';
        if(mobileIcon) mobileIcon.className = 'fas fa-circle-half-stroke';
    }

    function toggleTheme() {
        let isDark = htmlEl.getAttribute('data-theme') === 'dark';
        let newTheme = isDark ? 'light' : 'dark';
        htmlEl.setAttribute('data-theme', newTheme); 
        localStorage.setItem('theme', newTheme);
        if (newTheme === 'dark') htmlEl.classList.add('dark'); else htmlEl.classList.remove('dark');
        if (desktopIcon) desktopIcon.className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-circle-half-stroke';
        if (mobileIcon) mobileIcon.className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-circle-half-stroke';
    }
    if(desktopTheme) desktopTheme.addEventListener('click', toggleTheme);
    if(mobileTheme) mobileTheme.addEventListener('click', toggleTheme);

    function toggleRtl() { 
        let dir = htmlEl.getAttribute('dir') === 'rtl' ? 'ltr' : 'rtl'; 
        htmlEl.setAttribute('dir', dir); 
        localStorage.setItem('direction', dir); 
    }
    if(desktopRtl) desktopRtl.addEventListener('click', toggleRtl);
    if(mobileRtl) mobileRtl.addEventListener('click', toggleRtl);

    // mobile menu
    const menuBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    const closeBtn = document.getElementById('close-mobile-menu');

    if(menuBtn) {
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            mobileMenu.classList.add('active');
        });
    }
    if(closeBtn) {
        closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            mobileMenu.classList.remove('active');
        });
    }
    mobileMenu.addEventListener('click', (e) => {
        if (e.target === mobileMenu) {
            mobileMenu.classList.remove('active');
        }
    });

    // resize handler: close mobile menu on large screens
    window.addEventListener('resize', () => {
        if (window.innerWidth >= 1280) mobileMenu.classList.remove('active');
    });

    // logout/login redirect
    document.getElementById('mobile-logout-btn')?.addEventListener('click', function() {
        window.location.href = 'login.html';
    });

    // NO scroll button logic – no scroll at all
</script>
</body>
</html>
