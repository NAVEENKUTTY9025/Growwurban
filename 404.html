        /* FOOTER – compact */

<!-- ========== FOOTER (RESTORED) ========== -->


<button id="scroll-top" style="display:none;"><i class="fas fa-arrow-up"></i></button>

<script>
    (function() {
        const htmlEl = document.documentElement;
        const desktopTheme = document.getElementById('desktop-theme-toggle');
        const mobileTheme = document.getElementById('mobile-theme-toggle');
        const desktopIcon = document.getElementById('desktop-theme-icon');
        const mobileIcon = document.getElementById('mobile-theme-icon');
        const desktopRtl = document.getElementById('desktop-rtl-toggle');
        const mobileRtl = document.getElementById('mobile-rtl-toggle');
        const menuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const closeBtn = document.getElementById('close-mobile-menu');
        const mobileLogout = document.getElementById('mobile-logout-btn');

        // theme init - FIXED: properly apply saved theme
        let savedTheme = localStorage.getItem('theme') || 'light';
        htmlEl.setAttribute('data-theme', savedTheme);
        
        function updateThemeIcons(theme) {
            const iconClass = theme === 'dark' ? 'fas fa-sun' : 'fas fa-circle-half-stroke';
            if (desktopIcon) desktopIcon.className = iconClass;
            if (mobileIcon) mobileIcon.className = iconClass;
        }
        updateThemeIcons(savedTheme);

        function toggleTheme() {
            let currentTheme = htmlEl.getAttribute('data-theme');
            let newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            htmlEl.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcons(newTheme);
        }
        
        // Add event listeners with proper error handling
        if (desktopTheme) {
            desktopTheme.addEventListener('click', toggleTheme);
        }
        if (mobileTheme) {
            mobileTheme.addEventListener('click', toggleTheme);
        }

        // RTL function
        function toggleRtl() {
            let currentDir = htmlEl.getAttribute('dir') || 'ltr';
            let newDir = currentDir === 'rtl' ? 'ltr' : 'rtl';
            htmlEl.setAttribute('dir', newDir);
            localStorage.setItem('direction', newDir);
        }
        
        if (desktopRtl) {
            desktopRtl.addEventListener('click', toggleRtl);
        }
        if (mobileRtl) {
            mobileRtl.addEventListener('click', toggleRtl);
        }

        // mobile menu
        if (menuBtn) {
            menuBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                mobileMenu.classList.add('active');
            });
        }
        if (closeBtn) {
            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                mobileMenu.classList.remove('active');
            });
        }
        if (mobileMenu) {
            mobileMenu.addEventListener('click', (e) => {
                if (e.target === mobileMenu) {
                    mobileMenu.classList.remove('active');
                }
            });
        }
        
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 1280 && mobileMenu) {
                mobileMenu.classList.remove('active');
            }
        });

        if (mobileLogout) {
            mobileLogout.addEventListener('click', function() {
                window.location.href = 'login.html';
            });
        }

        // Apply saved direction
        const savedDir = localStorage.getItem('direction');
        if (savedDir) {
            htmlEl.setAttribute('dir', savedDir);
        }
    })();
</script>
