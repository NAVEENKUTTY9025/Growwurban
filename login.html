<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Login | Urban Farming</title>
    <link rel="icon" type="image/jpeg" href="/images/growwpark_logo.jpg" />
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..900&display=swap" rel="stylesheet">
    <style>
        /* ----- RESET & VARIABLES ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-primary: #FAFAFA;
            --bg-secondary: #f0f0e8;
            --text-main: #111111;
            --text-heading: #111111;
            --card-bg: #ffffff;
            --border-light: #ddddd5;
            --accent-green: #556B2F;
            --accent-brown: #6D4C41;
            --navbar-bg: #111111;
            --olive: #556B2F;
            --soil: #6D4C41;
            --deep: #111111;
            --smoke: #FAFAFA;
        }
        [data-theme="dark"] {
            --bg-primary: #111111;
            --bg-secondary: #1e1e1e;
            --text-main: #EAEAEA;
            --text-heading: #FAFAFA;
            --card-bg: #222222;
            --border-light: #3a3a3a;
            --accent-green: #6b8c3e;
            --accent-brown: #8b6b5a;
            --navbar-bg: #000000;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            line-height: 1.5;
            
            /* Base mobile-first: allow scroll, card centered */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4.5rem 1rem 2rem;  /* extra top padding for fixed buttons */
            margin: 0;
            position: relative;
        }

        /* desktop: perfect centering, no body scroll */
        @media (min-width: 1025px) {
            body {
                height: 100vh;
                overflow: hidden;
                padding: 0 1rem;  /* buttons still fixed, no extra padding needed */
            }
        }

        h1, h2, h3, h4, h5, h6 {
            color: var(--text-heading);
            font-weight: 700;
            line-height: 1.2;
        }

        a { text-decoration: none; }

        /* --- TOP RIGHT CONTROLS — always fixed, beautifully outside card --- */
        .top-right-controls {
            position: fixed;
            top: 1.5rem;
            right: 2rem;
            display: flex;
            gap: 0.8rem;
            z-index: 1000;
        }
        .control-bubble {
            width: 44px;
            height: 44px;
            background-color: var(--card-bg);
            border: 2px solid var(--olive);
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--olive);
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.25);
            backdrop-filter: blur(2px);
        }
        .control-bubble:hover {
            background-color: var(--olive);
            color: white;
            transform: scale(1.05);
        }

        /* Mobile fine-tuning: buttons stay outside with clear distance */
        @media (max-width: 600px) {
            .top-right-controls {
                top: 1rem;
                right: 1.5rem;     /* keeps them away from card edge */
                gap: 0.7rem;
            }
            .control-bubble {
                width: 42px;
                height: 42px;
                font-size: 1.1rem;
                background-color: var(--card-bg);
                border-width: 2px;
                box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            }
        }

        @media (max-width: 380px) {
            .top-right-controls {
                right: 1rem;
                top: 0.8rem;
            }
            .control-bubble {
                width: 40px;
                height: 40px;
            }
        }

        /* --- CARD styling — perfectly centered, never touches buttons --- */
        .auth-card {
            background-color: var(--card-bg);
            border-radius: 2.5rem;
            border: 1px solid rgba(85,107,47,0.25);
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 460px;
            padding: 1.2rem 1.8rem 1.8rem;
            transition: background-color 0.3s, box-shadow 0.3s;
            margin: 0 auto;  /* centers within flex parent */
            
            /* desktop max-height to avoid scroll if possible */
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }
        
        /* on mobile, card can take full natural height */
        @media (max-width: 1024px) {
            .auth-card {
                max-height: none;
                overflow-y: visible;
                padding: 1.2rem;
            }
        }

        /* --- BLACK STRIP WITH PURE WHITE LOGO --- */
        .logo-black-strip {
            background-color: #000000;
            border-radius: 2.5rem 2.5rem 1.5rem 1.5rem;
            padding: 0.8rem 1.5rem;
            margin-bottom: 0.8rem;
            width: 100%;
            text-align: center;
            box-shadow: 0 12px 24px rgba(0,0,0,0.3);
            border: 1px solid var(--olive);
        }
        [data-theme="dark"] .logo-black-strip {
            background-color: #000000;
            border-color: var(--olive);
        }

        .logo-uniform {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            text-decoration: none;
        }
        .logo-uniform .logo-icon {
            width: 2.6rem;
            height: 2.6rem;
            background-color: rgba(255,255,255,0.15);
            border-radius: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--olive);
        }
        .logo-uniform .logo-icon i {
            color: var(--olive);
            font-size: 1.6rem;
        }
        .logo-uniform .logo-text {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            color: #FFFFFF !important;
        }
        .logo-uniform .logo-text span { 
            color: #FFFFFF !important;
        }
        .logo-uniform .tagline {
            font-size: 0.6rem;
            color: #dddddd;
            display: block;
            margin-top: -0.2rem;
            font-weight: 500;
            letter-spacing: 0.05em;
        }

        /* tabs - compact */
        .tab-buttons {
            display: flex;
            gap: 0.8rem;
            border-bottom: 2px solid var(--border-light);
            margin: 0.2rem 0 1rem;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 0.4rem 0.6rem 0.3rem;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-main);
            opacity: 0.6;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .tab-btn.active {
            opacity: 1;
            color: var(--olive);
            border-bottom-color: var(--olive);
        }

        /* form elements */
        .input-group {
            margin-bottom: 0.9rem;
            position: relative;
        }
        .input-label {
            display: block;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.2rem;
            color: var(--text-main);
            opacity: 0.8;
        }
        .input-field-wrapper {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--olive);
            font-size: 0.8rem;
            opacity: 0.8;
            z-index: 2;
        }
        .input-field {
            width: 100%;
            background-color: var(--bg-primary);
            border: 2px solid var(--border-light);
            border-radius: 9999px;
            padding: 0.55rem 1rem 0.55rem 2.3rem;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            transition: 0.2s;
            font-size: 0.8rem;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--olive);
            box-shadow: 0 0 0 3px rgba(85,107,47,0.2);
        }
        .input-field::placeholder {
            color: var(--text-main);
            opacity: 0.4;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--text-main);
            opacity: 0.6;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .password-toggle:hover { color: var(--olive); opacity: 1; }

        /* remember & forgot row */
        .row-flex {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 0.4rem 0 0.8rem;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .remember-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .remember-wrapper input[type="checkbox"] {
            accent-color: var(--olive);
            width: 0.85rem;
            height: 0.85rem;
            margin: 0;
            cursor: pointer;
        }
        .remember-wrapper label {
            font-size: 0.75rem;
            cursor: pointer;
        }
        .forgot-link {
            color: var(--soil);
            font-size: 0.7rem;
            font-weight: 600;
            text-decoration: underline;
            text-underline-offset: 2px;
            white-space: nowrap;
        }
        .forgot-link:hover {
            color: var(--olive);
        }

        .btn-primary {
            background-color: var(--olive);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 9999px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: 0.2s;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .btn-primary:hover {
            background-color: white;
            color: var(--deep);
            border: 2px solid var(--olive);
            padding: calc(0.6rem - 2px) calc(1.2rem - 2px);
        }

        .btn-outline {
            border: 2px solid var(--olive);
            background: transparent;
            color: var(--olive);
            padding: 0.45rem 1rem;
            border-radius: 9999px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: 0.2s;
            cursor: pointer;
            width: 100%;
            font-size: 0.75rem;
        }
        .btn-outline:hover {
            background-color: var(--olive);
            color: white;
        }

        .social-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
            margin-top: 0.6rem;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .toast-container {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 9999;
        }
        .toast {
            background-color: var(--card-bg);
            border-left: 5px solid var(--olive);
            padding: 0.7rem 1.2rem;
            border-radius: 9999px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
            margin-bottom: 0.7rem;
            font-weight: 600;
            font-size: 0.85rem;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* CREATE ACCOUNT BUTTON */
        .create-btn-wrapper {
            margin-top: 1rem;
            text-align: center;
            border-top: 2px solid var(--border-light);
            padding-top: 1rem;
        }
        .btn-create {
            background-color: transparent;
            border: 2px solid var(--olive);
            color: var(--olive);
            padding: 0.6rem 1rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background-color: rgba(85,107,47,0.05);
        }
        .btn-create:hover {
            background-color: var(--olive);
            color: white;
            border-color: var(--olive);
            transform: scale(1.02);
            box-shadow: 0 8px 18px rgba(85,107,47,0.3);
        }

        /* small adjustments inside card */
        @media (max-width: 600px) {
            .auth-card { padding: 1rem; }
            .logo-black-strip { padding: 0.6rem 1rem; }
            .logo-uniform .logo-icon { width: 2.3rem; height: 2.3rem; }
            .logo-uniform .logo-icon i { font-size: 1.4rem; }
            .logo-uniform .logo-text { font-size: 1.4rem; }
            .row-flex { flex-wrap: wrap; gap: 0.4rem; }
            .forgot-link { white-space: normal; }
        }
    </style>
</head>
<body>
    <!-- TOP-RIGHT CONTROLS — perfectly outside, fixed position -->
    <div class="top-right-controls">
        <button class="control-bubble" id="rtl-toggle" title="RTL/LTR">
            <i class="fas fa-right-left"></i>
        </button>
        <button class="control-bubble" id="theme-toggle" title="Toggle theme">
            <i class="fas fa-circle-half-stroke" id="theme-icon"></i>
        </button>
    </div>

    <!-- MAIN CARD — perfectly centered in all views -->
    <div class="auth-card">
        <!-- BLACK STRIP WITH WHITE LOGO -->
        <div class="logo-black-strip">
            <a href="index.html" class="logo-uniform">
                <div class="logo-icon">
                    <i class="fas fa-seedling"></i>
                </div>
                <div>
                    <div class="logo-text">Urban Farming</div>
                    <span class="tagline">concrete harvest</span>
                </div>
            </a>
        </div>

        <!-- Tab Buttons (only sign in visible) -->
        <div class="tab-buttons">
            <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="login-form" class="tab-content active">
            <h3 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 0.1rem;">Welcome back</h3>
            <p style="margin-bottom: 0.8rem; opacity: 0.7; font-size:0.75rem;">Enter your credentials</p>

            <form onsubmit="handleAuth(event, 'login')">
                <div class="input-group">
                    <label class="input-label">Email</label>
                    <div class="input-field-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" class="input-field" placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Password</label>
                    <div class="input-field-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="input-field" id="login-password" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('login-password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- remember + forgot row -->
                <div class="row-flex">
                    <div class="remember-wrapper">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember this device</label>
                    </div>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-primary">
                    <i class="fas fa-seedling"></i> Sign In
                </button>

                <div style="margin-top: 1rem; border-top: 2px solid var(--border-light); padding-top: 0.8rem;">
                    <p style="text-align: center; font-size: 0.6rem; font-weight: 600; letter-spacing: 0.05em; margin-bottom: 0.4rem; opacity: 0.6;">CONNECT WITH</p>
                    <div class="social-buttons">
                        <button class="btn-outline"><i class="fab fa-google"></i> Google</button>
                        <button class="btn-outline"><i class="fab fa-facebook-f"></i> Facebook</button>
                    </div>
                </div>
            </form>

            <!-- CREATE ACCOUNT BUTTON -->
            <div class="create-btn-wrapper">
                <button class="btn-create" onclick="redirectToJoin()">
                    <i class="fas fa-user-plus"></i> Create account
                </button>
            </div>
        </div>

        <!-- Register placeholder (unused) -->
        <div id="register-form" class="tab-content" style="display: none;"></div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        // THEME & RTL
        const html = document.documentElement;
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const rtlToggle = document.getElementById('rtl-toggle');

        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        function updateThemeIcon(theme) {
            themeIcon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-circle-half-stroke';
        }

        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon(next);
        });

        rtlToggle.addEventListener('click', () => {
            const dir = html.getAttribute('dir') === 'ltr' ? 'rtl' : 'ltr';
            html.setAttribute('dir', dir);
        });

        // TAB SWITCHING (only login active)
        window.switchTab = function(tab) {
            // keep login active always
            const loginTab = document.getElementById('tab-login');
            const loginForm = document.getElementById('login-form');
            loginTab.classList.add('active');
            loginForm.classList.add('active');
        };

        // PASSWORD TOGGLE
        window.togglePassword = function(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        };

        // TOAST
        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // FAKE AUTH (redirects to userdash.html)
        window.handleAuth = function(e, type) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> processing...';
            btn.disabled = true;

            setTimeout(() => {
                showToast(type === 'login' ? 'Welcome back, grower! 🌱' : 'Account created! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'userdash.html';
                }, 1000);
            }, 1200);
        };

        // REDIRECT TO JOIN.HTML (Create account button)
        window.redirectToJoin = function() {
            window.location.href = 'join.html';
        };
    </script>
</body>
</html>
