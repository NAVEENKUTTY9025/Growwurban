<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Urban Farming</title>
     <link rel="icon" type="image/jpeg" href="/images/growwpark_logo.jpg" />
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..900&display=swap" rel="stylesheet">
    <style>
        /* ----- RESET & VARIABLES ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-primary: #FAFAFA;
            --bg-secondary: #f0f0e8;
            --text-main: #111111;
            --text-heading: #111111;
            --card-bg: #ffffff;
            --border-light: #ddddd5;
            --accent-green: #556B2F;
            --accent-brown: #6D4C41;
            --navbar-bg: #111111;
            --olive: #556B2F;
            --soil: #6D4C41;
            --deep: #111111;
            --smoke: #FAFAFA;
        }
        [data-theme="dark"] {
            --bg-primary: #111111;
            --bg-secondary: #1e1e1e;
            --text-main: #EAEAEA;
            --text-heading: #FAFAFA;
            --card-bg: #222222;
            --border-light: #3a3a3a;
            --accent-green: #6b8c3e;
            --accent-brown: #8b6b5a;
            --navbar-bg: #000000;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            line-height: 1.5;
            
            /* --- DESKTOP: ABSOLUTELY NO SCROLL, PERFECT CENTERING --- */
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 1rem;
            margin: 0;
        }

        /* tablet / mobile: allow scroll, but we keep desktop scroll-free */
        @media (max-width: 1024px) {
            body {
                height: auto;
                min-height: 100vh;
                overflow-y: auto;
                padding: 2rem 1rem;
                align-items: flex-start;
            }
        }

        h1, h2, h3, h4, h5, h6 {
            color: var(--text-heading);
            font-weight: 700;
            line-height: 1.2;
        }

        a { text-decoration: none; }

        /* --- BLACK STRIP WITH PURE WHITE LOGO --- */
        .logo-black-strip {
            background-color: #000000;
            border-radius: 2.5rem 2.5rem 1.5rem 1.5rem;
            padding: 0.8rem 1.5rem;           /* tighter padding */
            margin-bottom: 0.8rem;             /* reduced margin */
            width: 100%;
            text-align: center;
            box-shadow: 0 12px 24px rgba(0,0,0,0.3);
            border: 1px solid var(--olive);
        }
        [data-theme="dark"] .logo-black-strip {
            background-color: #000000;
            border-color: var(--olive);
        }

        .logo-uniform {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            text-decoration: none;
        }
        .logo-uniform .logo-icon {
            width: 2.6rem;
            height: 2.6rem;
            background-color: rgba(255,255,255,0.15);
            border-radius: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--olive);
        }
        .logo-uniform .logo-icon i {
            color: var(--olive);
            font-size: 1.6rem;
        }
        .logo-uniform .logo-text {
            font-size: 1.5rem;                /* slightly smaller */
            font-weight: 900;
            letter-spacing: -0.02em;
            color: #FFFFFF !important;
        }
        .logo-uniform .logo-text span { 
            color: #FFFFFF !important;
        }
        .logo-uniform .tagline {
            font-size: 0.6rem;
            color: #dddddd;
            display: block;
            margin-top: -0.2rem;
            font-weight: 500;
            letter-spacing: 0.05em;
        }

        /* main card – TIGHT, NO SCROLL */
        .auth-card {
            background-color: var(--card-bg);
            border-radius: 2.5rem;
            border: 1px solid rgba(85,107,47,0.25);
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 460px;                  /* slightly narrower */
            padding: 1.2rem 1.8rem 1.8rem;     /* tightened padding */
            transition: background-color 0.3s, box-shadow 0.3s;
            margin: 0 auto;
            
            max-height: calc(100vh - 70px);
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
        }
        @media (max-width: 1024px) {
            .auth-card {
                max-height: none;
                overflow-y: visible;
                padding: 1.2rem;
            }
        }

        /* button bar */
        .button-bar {
            display: flex;
            justify-content: flex-end;
            gap: 0.6rem;
            max-width: 460px;
            margin: 0 auto 0.4rem;
            width: 100%;
        }
        .control-bubble {
            width: 40px;
            height: 40px;
            background-color: var(--card-bg);
            border: 2px solid var(--olive);
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--olive);
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }
        .control-bubble:hover {
            background-color: var(--olive);
            color: white;
            transform: scale(1.05);
        }

        /* tabs - compact */
        .tab-buttons {
            display: flex;
            gap: 0.8rem;
            border-bottom: 2px solid var(--border-light);
            margin: 0.2rem 0 1rem;            /* reduced margins */
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 0.4rem 0.6rem 0.3rem;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-main);
            opacity: 0.6;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .tab-btn.active {
            opacity: 1;
            color: var(--olive);
            border-bottom-color: var(--olive);
        }

        /* form elements - compact */
        .input-group {
            margin-bottom: 0.9rem;              /* reduced */
            position: relative;
        }
        .input-label {
            display: block;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.2rem;
            color: var(--text-main);
            opacity: 0.8;
        }
        .input-field-wrapper {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--olive);
            font-size: 0.8rem;
            opacity: 0.8;
            z-index: 2;
        }
        .input-field {
            width: 100%;
            background-color: var(--bg-primary);
            border: 2px solid var(--border-light);
            border-radius: 9999px;
            padding: 0.55rem 1rem 0.55rem 2.3rem;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            transition: 0.2s;
            font-size: 0.8rem;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--olive);
            box-shadow: 0 0 0 3px rgba(85,107,47,0.2);
        }
        .input-field::placeholder {
            color: var(--text-main);
            opacity: 0.4;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--text-main);
            opacity: 0.6;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .password-toggle:hover { color: var(--olive); opacity: 1; }

        .btn-primary {
            background-color: var(--olive);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 9999px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: 0.2s;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .btn-primary:hover {
            background-color: white;
            color: var(--deep);
            border: 2px solid var(--olive);
            padding: calc(0.6rem - 2px) calc(1.2rem - 2px);
        }

        .btn-outline {
            border: 2px solid var(--olive);
            background: transparent;
            color: var(--olive);
            padding: 0.45rem 1rem;
            border-radius: 9999px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: 0.2s;
            cursor: pointer;
            width: 100%;
            font-size: 0.75rem;
        }
        .btn-outline:hover {
            background-color: var(--olive);
            color: white;
        }

        .social-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
            margin-top: 0.6rem;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .forgot-link {
            color: var(--soil);
            font-size: 0.65rem;
            font-weight: 600;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .toast-container {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 9999;
        }
        .toast {
            background-color: var(--card-bg);
            border-left: 5px solid var(--olive);
            padding: 0.7rem 1.2rem;
            border-radius: 9999px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
            margin-bottom: 0.7rem;
            font-weight: 600;
            font-size: 0.85rem;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* CREATE ACCOUNT BUTTON - VISIBLE & NEAT */
        .create-btn-wrapper {
            margin-top: 1rem;
            text-align: center;
            border-top: 2px solid var(--border-light);
            padding-top: 1rem;
        }
        .btn-create {
            background-color: transparent;
            border: 2px solid var(--olive);      /* solid border for visibility */
            color: var(--olive);
            padding: 0.6rem 1rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background-color: rgba(85,107,47,0.05); /* subtle tint */
        }
        .btn-create:hover {
            background-color: var(--olive);
            color: white;
            border-color: var(--olive);
            transform: scale(1.02);
            box-shadow: 0 8px 18px rgba(85,107,47,0.3);
        }

        /* small adjustments */
        @media (max-width: 600px) {
            .auth-card { padding: 1rem; }
            .logo-black-strip { padding: 0.6rem 1rem; }
            .logo-uniform .logo-icon { width: 2.3rem; height: 2.3rem; }
            .logo-uniform .logo-icon i { font-size: 1.4rem; }
            .logo-uniform .logo-text { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <!-- BUTTON BAR (theme/rtl) -->
        <div class="button-bar">
            <button class="control-bubble" id="rtl-toggle" title="RTL/LTR">
                <i class="fas fa-right-left"></i>
            </button>
            <button class="control-bubble" id="theme-toggle" title="Toggle theme">
                <i class="fas fa-circle-half-stroke" id="theme-icon"></i>
            </button>
        </div>

        <!-- AUTH CARD - TIGHT & CLEAN -->
        <div class="auth-card">
            <!-- BLACK STRIP WITH WHITE LOGO -->
            <div class="logo-black-strip">
                <a href="index.html" class="logo-uniform">
                    <div class="logo-icon">
                        <i class="fas fa-seedling"></i>
                    </div>
                    <div>
                        <div class="logo-text">Urban Farming</div>
                        <span class="tagline">concrete harvest</span>
                    </div>
                </a>
            </div>

            <!-- Tab Buttons (only sign in visible, but kept for structure) -->
            <div class="tab-buttons">
                <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
                <!-- register tab intentionally omitted to keep clean, but button below handles create -->
            </div>

            <!-- LOGIN FORM (active by default, tightened) -->
            <div id="login-form" class="tab-content active">
                <h3 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 0.1rem;">Welcome back</h3>
                <p style="margin-bottom: 0.8rem; opacity: 0.7; font-size:0.75rem;">Enter your credentials</p>

                <form onsubmit="handleAuth(event, 'login')">
                    <div class="input-group">
                        <label class="input-label">Email</label>
                        <div class="input-field-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" class="input-field" placeholder="you@example.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <label class="input-label">Password</label>
                        </div>
                        <div class="input-field-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" class="input-field" id="login-password" placeholder="••••••••" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('login-password', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <a href="#" class="forgot-link" style="display:block; text-align:right; margin-top:0.2rem;">Forgot?</a>
                    </div>

                    <div style="display: flex; align-items: center; gap:0.5rem; margin:0.4rem 0 0.8rem;">
                        <input type="checkbox" id="remember" style="accent-color: var(--olive); width:0.85rem; height:0.85rem;">
                        <label for="remember" style="font-size: 0.75rem;">Remember this device</label>
                    </div>

                    <button type="submit" class="btn-primary">
                        <i class="fas fa-seedling"></i> Sign In
                    </button>

                    <div style="margin-top: 1rem; border-top: 2px solid var(--border-light); padding-top: 0.8rem;">
                        <p style="text-align: center; font-size: 0.6rem; font-weight: 600; letter-spacing: 0.05em; margin-bottom: 0.4rem; opacity: 0.6;">CONNECT WITH</p>
                        <div class="social-buttons">
                            <button class="btn-outline"><i class="fab fa-google"></i> Google</button>
                            <button class="btn-outline"><i class="fab fa-facebook-f"></i> Facebook</button>
                        </div>
                    </div>
                </form>

                <!-- CREATE ACCOUNT BUTTON - clearly visible, redirects to join.html -->
                <div class="create-btn-wrapper">
                    <button class="btn-create" onclick="redirectToJoin()">
                        <i class="fas fa-user-plus"></i> Create account
                    </button>
                </div>
            </div>

            <!-- Register form hidden, not needed -->
            <div id="register-form" class="tab-content" style="display: none;"></div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        // THEME & RTL
        const html = document.documentElement;
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const rtlToggle = document.getElementById('rtl-toggle');

        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        function updateThemeIcon(theme) {
            themeIcon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-circle-half-stroke';
        }

        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon(next);
        });

        rtlToggle.addEventListener('click', () => {
            const dir = html.getAttribute('dir') === 'ltr' ? 'rtl' : 'ltr';
            html.setAttribute('dir', dir);
        });

        // TAB SWITCHING (only login active)
        window.switchTab = function(tab) {
            // keep login active always
            const loginTab = document.getElementById('tab-login');
            const loginForm = document.getElementById('login-form');
            loginTab.classList.add('active');
            loginForm.classList.add('active');
        };

        // PASSWORD TOGGLE
        window.togglePassword = function(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        };

        // TOAST
        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // FAKE AUTH (redirects to userdash.html)
        window.handleAuth = function(e, type) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> processing...';
            btn.disabled = true;

            setTimeout(() => {
                showToast(type === 'login' ? 'Welcome back, grower! 🌱' : 'Account created! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'userdash.html';
                }, 1000);
            }, 1200);
        };

        // REDIRECT TO JOIN.HTML (Create account button)
        window.redirectToJoin = function() {
            window.location.href = 'join.html';
        };
    </script>
</body>
</html>
