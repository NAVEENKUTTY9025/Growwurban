<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · Register | Groww Urban</title>
     <link rel="icon" type="image/jpeg" href="/images/growwpark_logo.jpg" />
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..900&display=swap" rel="stylesheet">
    <style>
        /* ----- RESET & VARIABLES ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-primary: #FAFAFA;
            --bg-secondary: #f0f0e8;
            --text-main: #111111;
            --text-heading: #111111;
            --card-bg: #ffffff;
            --border-light: #ddddd5;
            --accent-green: #556B2F;
            --accent-brown: #6D4C41;
            --navbar-bg: #111111;
            --olive: #556B2F;
            --soil: #6D4C41;
            --deep: #111111;
            --smoke: #FAFAFA;
        }
        [data-theme="dark"] {
            --bg-primary: #111111;
            --bg-secondary: #1e1e1e;
            --text-main: #EAEAEA;
            --text-heading: #FAFAFA;
            --card-bg: #222222;
            --border-light: #3a3a3a;
            --accent-green: #6b8c3e;
            --accent-brown: #8b6b5a;
            --navbar-bg: #000000;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            line-height: 1.5;
            
            /* --- DESKTOP: ABSOLUTELY NO SCROLL, PERFECT CENTERING --- */
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 1rem;
            margin: 0;
        }

        /* tablet / mobile: allow scroll, but we keep desktop scroll-free */
        @media (max-width: 1024px) {
            body {
                height: auto;
                min-height: 100vh;
                overflow-y: auto;
                padding: 2rem 1rem;
                align-items: flex-start;
            }
        }

        h1, h2, h3, h4, h5, h6 {
            color: var(--text-heading);
            font-weight: 700;
            line-height: 1.2;
        }

        a { text-decoration: none; }

        /* --- BLACK STRIP WITH PURE WHITE LOGO (GrowwUrban fully white) --- */
        .logo-black-strip {
            background-color: #6D4C41;        /* pure black */
            border-radius: 2.5rem 2.5rem 1.5rem 1.5rem;
            padding: 1rem 2rem;
            margin-bottom: 1.2rem;
            width: 100%;
            text-align: center;
            box-shadow: 0 12px 24px rgba(0,0,0,0.3);
            border: 1px solid var(--olive);
        }
        /* keep black even in dark mode */
        [data-theme="dark"] .logo-black-strip {
            background-color: #000000;
            border-color: var(--olive);
        }

        .logo-uniform {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            text-decoration: none;
            color: inherit;
        }
        .logo-uniform .logo-icon {
            width: 3rem;
            height: 3rem;
            background-color: rgba(255,255,255,0.15);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--olive);
        }
        .logo-uniform .logo-icon i {
            color: var(--olive);
            font-size: 2rem;
        }
        .logo-uniform .logo-text {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            color: #FFFFFF !important;      /* force pure white */
        }
        .logo-uniform .logo-text span { 
            color: #FFFFFF !important;       /* span also pure white, no olive */
        }
        .logo-uniform .tagline {
            font-size: 0.7rem;
            color: #dddddd;                  /* light gray */
            display: block;
            margin-top: -0.25rem;
            font-weight: 500;
            letter-spacing: 0.05em;
        }

        /* main card – TIGHT, NO SCROLL on desktop */
        .auth-card {
            background-color: var(--card-bg);
            border-radius: 2.5rem;
            border: 1px solid rgba(85,107,47,0.25);
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 480px;                /* tighter width */
            padding: 1.5rem 2rem 2rem;       /* reduced top padding */
            transition: background-color 0.3s, box-shadow 0.3s;
            margin: 0 auto;
            
            /* desktop: fixed height, no internal scroll */
            max-height: calc(100vh - 90px);
            overflow-y: hidden;               /* NO SCROLL inside card */
            display: flex;
            flex-direction: column;
        }
        /* tablet / mobile: allow natural height */
        @media (max-width: 1024px) {
            .auth-card {
                max-height: none;
                overflow-y: visible;
                padding: 1.5rem;
            }
        }

        /* button bar */
        .button-bar {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            max-width: 480px;
            margin: 0 auto 0.6rem;
            width: 100%;
        }
        .control-bubble {
            width: 44px;
            height: 44px;
            background-color: var(--card-bg);
            border: 2px solid var(--olive);
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--olive);
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }
        .control-bubble:hover {
            background-color: var(--olive);
            color: white;
            transform: scale(1.05);
        }

        /* tabs - compact */
        .tab-buttons {
            display: flex;
            gap: 1rem;
            border-bottom: 2px solid var(--border-light);
            margin: 0.5rem 0 1.2rem;          /* reduced margins */
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 0.5rem 0.8rem 0.4rem;
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-main);
            opacity: 0.6;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .tab-btn.active {
            opacity: 1;
            color: var(--olive);
            border-bottom-color: var(--olive);
        }

        /* form elements - more compact */
        .input-group {
            margin-bottom: 1rem;               /* reduced */
            position: relative;
        }
        .input-label {
            display: block;
            font-size: 0.65rem;                 /* smaller */
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
            color: var(--text-main);
            opacity: 0.8;
        }
        .input-field-wrapper {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--olive);
            font-size: 0.9rem;
            opacity: 0.8;
            z-index: 2;
        }
        .input-field {
            width: 100%;
            background-color: var(--bg-primary);
            border: 2px solid var(--border-light);
            border-radius: 9999px;
            padding: 0.6rem 1rem 0.6rem 2.5rem;  /* smaller padding */
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            transition: 0.2s;
            font-size: 0.85rem;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--olive);
            box-shadow: 0 0 0 3px rgba(85,107,47,0.2);
        }
        .input-field::placeholder {
            color: var(--text-main);
            opacity: 0.4;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--text-main);
            opacity: 0.6;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .password-toggle:hover { color: var(--olive); opacity: 1; }

        .btn-primary {
            background-color: var(--olive);
            color: white;
            padding: 0.7rem 1.2rem;            /* more compact */
            border-radius: 9999px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: 0.2s;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .btn-primary:hover {
            background-color: white;
            color: var(--deep);
            border: 2px solid var(--olive);
            padding: calc(0.7rem - 2px) calc(1.2rem - 2px);
        }

        .btn-outline {
            border: 2px solid var(--olive);
            background: transparent;
            color: var(--olive);
            padding: 0.5rem 1rem;               /* compact */
            border-radius: 9999px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: 0.2s;
            cursor: pointer;
            width: 100%;
            font-size: 0.8rem;
        }
        .btn-outline:hover {
            background-color: var(--olive);
            color: white;
        }

        .social-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin-top: 0.8rem;
        }

        .strength-bar {
            height: 5px;
            width: 0%;
            border-radius: 9999px;
            background-color: var(--soil);
            transition: width 0.3s;
        }
        .strength-text {
            font-size: 0.65rem;
            font-weight: 600;
            margin-top: 0.2rem;
            color: var(--text-main);
            opacity: 0.7;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .forgot-link {
            color: var(--soil);
            font-size: 0.7rem;
            font-weight: 600;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .toast-container {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 9999;
        }
        .toast {
            background-color: var(--card-bg);
            border-left: 5px solid var(--olive);
            padding: 0.8rem 1.2rem;
            border-radius: 9999px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
            margin-bottom: 0.75rem;
            font-weight: 600;
            font-size: 0.9rem;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* small adjustments */
        @media (max-width: 600px) {
            .auth-card { padding: 1.2rem; }
            .logo-black-strip { padding: 0.8rem 1rem; }
            .logo-uniform .logo-icon { width: 2.6rem; height: 2.6rem; }
            .logo-uniform .logo-icon i { font-size: 1.7rem; }
            .logo-uniform .logo-text { font-size: 1.6rem; }
        }
        @media (max-width: 380px) {
            .auth-card { padding: 1rem; }
            .tab-buttons { gap: 0.3rem; }
        }
    </style>
</head>
<body>
    <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <!-- BUTTON BAR (theme/rtl) -->
        <div class="button-bar">
            <button class="control-bubble" id="rtl-toggle" title="RTL/LTR">
                <i class="fas fa-right-left"></i>
            </button>
            <button class="control-bubble" id="theme-toggle" title="Toggle theme">
                <i class="fas fa-circle-half-stroke" id="theme-icon"></i>
            </button>
        </div>

        <!-- AUTH CARD - TIGHT, NO SCROLL -->
        <div class="auth-card">
            <!-- BLACK STRIP WITH FULL WHITE LOGO (GrowwUrban all white) -->
            <div class="logo-black-strip">
                <a href="index.html" class="logo-uniform">
                    <div class="logo-icon">
                        <i class="fas fa-seedling"></i>
                    </div>
                    <div>
                        <div class="logo-text">Groww Urban</div>   <!-- all white, no span -->
                        <span class="tagline">concrete harvest</span>
                    </div>
                </a>
            </div>

            <!-- Tab Buttons -->
            <div class="tab-buttons">
                <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Join Now</button>
            </div>

            <!-- LOGIN FORM (kept compact, but visible) -->
            <div id="login-form" class="tab-content active">
                <h3 style="font-size: 1.6rem; font-weight: 800; margin-bottom: 0.2rem;">Welcome back</h3>
                <p style="margin-bottom: 1rem; opacity: 0.7; font-size:0.8rem;">Enter your credentials.</p>

                <form onsubmit="handleAuth(event, 'login')">
                    <div class="input-group">
                        <label class="input-label">Email</label>
                        <div class="input-field-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" class="input-field" placeholder="you@example.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <label class="input-label">Password</label>
                            <a href="#" class="forgot-link">Forgot Password?</a>
                        </div>
                        <div class="input-field-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" class="input-field" id="login-password" placeholder="••••••••" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('login-password', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div style="display: flex; align-items: center; gap:0.5rem; margin:0.6rem 0 1rem;">
                        <input type="checkbox" id="remember" style="accent-color: var(--olive); width:0.9rem; height:0.9rem;">
                        <label for="remember" style="font-size: 0.8rem;">Remember this device</label>
                    </div>

                    <button type="submit" class="btn-primary">
                        <i class="fas fa-seedling"></i> Sign In
                    </button>

                    <div style="margin-top: 1.2rem; border-top: 2px solid var(--border-light); padding-top: 1rem;">
                        <p style="text-align: center; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.05em; margin-bottom: 0.6rem; opacity: 0.6;">CONNECT WITH</p>
                        <div class="social-buttons">
                            <button class="btn-outline"><i class="fab fa-google"></i> Google</button>
                            <button class="btn-outline"><i class="fab fa-facebook-f"></i> Facebook</button>
                        </div>
                    </div>
                </form>
            </div>

            <!-- REGISTER FORM - TIGHT, NO SCROLL (exactly like login, but with register fields) -->
            <div id="register-form" class="tab-content">
                <h3 style="font-size: 1.6rem; font-weight: 800; margin-bottom: 0.2rem;">Start growing</h3>
                <p style="margin-bottom: 0.8rem; opacity: 0.7; font-size:0.8rem;">Create your account.</p>

                <form onsubmit="handleAuth(event, 'register')">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem;">
                        <div class="input-group">
                            <label class="input-label">First</label>
                            <div class="input-field-wrapper">
                                <i class="fas fa-user input-icon"></i>
                                <input type="text" class="input-field" placeholder="Maya" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Last</label>
                            <div class="input-field-wrapper">
                                <i class="fas fa-user input-icon"></i>
                                <input type="text" class="input-field" placeholder="Chen" required>
                            </div>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Email</label>
                        <div class="input-field-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" class="input-field" placeholder="maya@urbanfarm.com" required>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem;">
                        <div class="input-group">
                            <label class="input-label">Password</label>
                            <div class="input-field-wrapper">
                                <i class="fas fa-lock input-icon"></i>
                                <input type="password" class="input-field" id="reg-password" placeholder="••••••" required oninput="updateStrength()">
                                <button type="button" class="password-toggle" onclick="togglePassword('reg-password', this)">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Confirm</label>
                            <div class="input-field-wrapper">
                                <i class="fas fa-lock input-icon"></i>
                                <input type="password" class="input-field" id="confirm-password" placeholder="••••••" required>
                                <button type="button" class="password-toggle" onclick="togglePassword('confirm-password', this)">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Password strength bar (compact) -->
                    <div style="margin: 0.2rem 0 0.8rem;">
                        <div style="height: 5px; background: var(--border-light); border-radius: 9999px; overflow: hidden;">
                            <div id="strength-bar" class="strength-bar" style="width: 0%;"></div>
                        </div>
                        <div id="strength-text" class="strength-text">Password strength</div>
                    </div>

                    <button type="submit" class="btn-primary">
                        <i class="fas fa-leaf"></i> Join
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        // THEME & RTL
        const html = document.documentElement;
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const rtlToggle = document.getElementById('rtl-toggle');

        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        function updateThemeIcon(theme) {
            themeIcon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-circle-half-stroke';
        }

        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon(next);
        });

        rtlToggle.addEventListener('click', () => {
            const dir = html.getAttribute('dir') === 'ltr' ? 'rtl' : 'ltr';
            html.setAttribute('dir', dir);
        });

        // TAB SWITCHING
        window.switchTab = function(tab) {
            const loginTab = document.getElementById('tab-login');
            const registerTab = document.getElementById('tab-register');
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');

            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
            } else {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.classList.add('active');
                loginForm.classList.remove('active');
            }
        };

        // PASSWORD TOGGLE
        window.togglePassword = function(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        };

        // PASSWORD STRENGTH
        window.updateStrength = function() {
            const pass = document.getElementById('reg-password').value;
            const bar = document.getElementById('strength-bar');
            const text = document.getElementById('strength-text');
            let strength = 0;
            if (pass.length > 4) strength += 25;
            if (pass.length > 7) strength += 25;
            if (/[0-9]/.test(pass)) strength += 20;
            if (/[A-Z]/.test(pass)) strength += 15;
            if (/[^A-Za-z0-9]/.test(pass)) strength += 15;
            bar.style.width = Math.min(strength, 100) + '%';
            if (strength < 30) text.innerText = 'weak · add numbers & symbols';
            else if (strength < 60) text.innerText = 'medium · getting there';
            else text.innerText = 'strong · good to go!';
        };

        // TOAST
        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // FAKE AUTH (redirects to userdash.html)
        window.handleAuth = function(e, type) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> processing...';
            btn.disabled = true;

            setTimeout(() => {
                showToast(type === 'login' ? 'Welcome back, grower! 🌱' : 'Account created! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'userdash.html';
                }, 1000);
            }, 1200);
        };
    </script>
</body>
</html>
